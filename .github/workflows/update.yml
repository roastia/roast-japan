name: 自家焙煎珈琲店データ自動更新

on:
  # 毎週月曜日 AM3:00（JST）に自動実行
  schedule:
    - cron: '0 18 * * 0'   # UTC 18:00 = JST 03:00
  # 手動実行ボタン（GitHub画面から手動でも実行できる）
  workflow_dispatch:
    inputs:
      prefecture:
        description: '都道府県（例: 東京都）空白なら全国'
        required: false
        default: ''

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最大6時間

    steps:
      # ① リポジトリをチェックアウト
      - name: リポジトリ取得
        uses: actions/checkout@v4

      # ② Python セットアップ
      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ③ 依存ライブラリのインストール
      - name: ライブラリインストール
        run: |
          pip install playwright psycopg2-binary python-dotenv tqdm requests
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # ④ output フォルダを作成
      - name: フォルダ準備
        run: mkdir -p output

      # ⑤ スクレイピング実行
      - name: Google Maps スクレイピング
        run: |
          if [ -n "${{ github.event.inputs.prefecture }}" ]; then
            python scraper_google_maps.py --pref "${{ github.event.inputs.prefecture }}" --dry-run
          else
            python scraper_google_maps.py --dry-run
          fi
        env:
          PYTHONUNBUFFERED: '1'

      # ⑥ shops.json に変換
      - name: shops.json 変換
        run: |
          if ls output/shops_*.json 1> /dev/null 2>&1; then
            python convert_to_web.py output/shops_*.json --out shops.json
            echo "変換完了"
            wc -l shops.json
          else
            echo "スクレイピングデータなし。既存の shops.json を維持します"
          fi

      # ⑦ 変更をコミット＆プッシュ（shops.json が更新された場合のみ）
      - name: shops.json をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shops.json
          if git diff --staged --quiet; then
            echo "shops.json に変更なし。スキップ"
          else
            SHOP_COUNT=$(python -c "import json; print(len(json.load(open('shops.json'))))")
            git commit -m "🔄 データ自動更新: ${SHOP_COUNT}件 ($(date +'%Y-%m-%d'))"
            git push
            echo "プッシュ完了: ${SHOP_COUNT}件"
          fi
