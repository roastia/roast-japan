name: 自家焙煎珈琲店データ自動更新

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      prefectures:
        description: '都道府県（カンマ区切り 例: 東京都,神奈川県 / 空白なら全国）'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        prefecture:
          - 北海道
          - 青森県
          - 岩手県
          - 宮城県
          - 秋田県
          - 山形県
          - 福島県
          - 茨城県
          - 栃木県
          - 群馬県
          - 埼玉県
          - 千葉県
          - 東京都
          - 神奈川県
          - 新潟県
          - 富山県
          - 石川県
          - 福井県
          - 山梨県
          - 長野県
          - 岐阜県
          - 静岡県
          - 愛知県
          - 三重県
          - 滋賀県
          - 京都府
          - 大阪府
          - 兵庫県
          - 奈良県
          - 和歌山県
          - 鳥取県
          - 島根県
          - 岡山県
          - 広島県
          - 山口県
          - 徳島県
          - 香川県
          - 愛媛県
          - 高知県
          - 福岡県
          - 佐賀県
          - 長崎県
          - 熊本県
          - 大分県
          - 宮崎県
          - 鹿児島県
          - 沖縄県

    steps:
      - name: 対象県チェック
        id: check
        run: |
          PREFS="${{ github.event.inputs.prefectures }}"
          PREF="${{ matrix.prefecture }}"
          if [ -z "$PREFS" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            if echo "$PREFS" | grep -q "$PREF"; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: リポジトリ取得
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Python セットアップ
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        if: steps.check.outputs.run == 'true'
        run: |
          pip install playwright python-dotenv tqdm requests
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: フォルダ準備
        if: steps.check.outputs.run == 'true'
        run: mkdir -p output

      - name: スクレイピング
        if: steps.check.outputs.run == 'true'
        run: python scraper_google_maps.py --pref "${{ matrix.prefecture }}" --dry-run
        env:
          PYTHONUNBUFFERED: '1'

      - name: コミット（リトライあり）
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            echo "試行 ${i}/5"

            # 最新を取得してからマージ実行
            git fetch origin main
            git checkout origin/main -- shops.json 2>/dev/null || true

            python merge_shops.py "${{ matrix.prefecture }}"

            git add shops.json
            if git diff --staged --quiet; then
              echo "変更なし。スキップ"
              exit 0
            fi

            COUNT=$(python -c "import json; print(len(json.load(open('shops.json'))))")
            git commit -m "🔄 ${{ matrix.prefecture }}: ${COUNT}件 ($(date +'%Y-%m-%d'))"

            if git push origin main; then
              echo "✅ 完了: ${COUNT}件"
              exit 0
            else
              echo "競合。リトライ..."
              git reset --soft HEAD~1
              sleep $((i * 5))
            fi
          done

          echo "❌ 失敗"
          exit 1
