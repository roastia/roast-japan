name: 自家焙煎珈琲店データ自動更新

on:
  schedule:
    - cron: '0 18 * * 0'   # 毎週月曜 AM3:00 JST
  workflow_dispatch:
    inputs:
      prefectures:
        description: '都道府県（カンマ区切り 例: 東京都,神奈川県 / 空白なら全国）'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 1県あたり最大60分

    strategy:
      max-parallel: 1      # 1県ずつ順番に実行
      fail-fast: false     # 1県失敗しても他の県は続行
      matrix:
        prefecture:
          - 北海道
          - 青森県
          - 岩手県
          - 宮城県
          - 秋田県
          - 山形県
          - 福島県
          - 茨城県
          - 栃木県
          - 群馬県
          - 埼玉県
          - 千葉県
          - 東京都
          - 神奈川県
          - 新潟県
          - 富山県
          - 石川県
          - 福井県
          - 山梨県
          - 長野県
          - 岐阜県
          - 静岡県
          - 愛知県
          - 三重県
          - 滋賀県
          - 京都府
          - 大阪府
          - 兵庫県
          - 奈良県
          - 和歌山県
          - 鳥取県
          - 島根県
          - 岡山県
          - 広島県
          - 山口県
          - 徳島県
          - 香川県
          - 愛媛県
          - 高知県
          - 福岡県
          - 佐賀県
          - 長崎県
          - 熊本県
          - 大分県
          - 宮崎県
          - 鹿児島県
          - 沖縄県

    steps:
      # 指定県フィルター（workflow_dispatchで県を指定した場合はその県のみ実行）
      - name: 対象県チェック
        id: check
        run: |
          PREFS="${{ github.event.inputs.prefectures }}"
          PREF="${{ matrix.prefecture }}"
          if [ -z "$PREFS" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            if echo "$PREFS" | grep -q "$PREF"; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
              echo "$PREF はスキップ"
            fi
          fi

      - name: リポジトリ取得
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Python セットアップ
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        if: steps.check.outputs.run == 'true'
        run: |
          pip install playwright python-dotenv tqdm requests
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: フォルダ準備
        if: steps.check.outputs.run == 'true'
        run: mkdir -p output

      - name: "${{ matrix.prefecture }} スクレイピング"
        if: steps.check.outputs.run == 'true'
        run: |
          python scraper_google_maps.py --pref "${{ matrix.prefecture }}" --dry-run
        env:
          PYTHONUNBUFFERED: '1'

      - name: shops.json に追加マージ
        if: steps.check.outputs.run == 'true'
        run: |
          if ! ls output/shops_*.json 1> /dev/null 2>&1; then
            echo "取得データなし。スキップ"
            exit 0
          fi

          python - << 'PYEOF'
import json
from pathlib import Path

# 新規取得データを変換
import subprocess
subprocess.run(['python', 'convert_to_web.py'] +
    [str(p) for p in Path('output').glob('shops_*.json')] +
    ['--out', 'shops_new.json'], check=True)

new_data = json.load(open('shops_new.json', encoding='utf-8'))
print(f"新規取得: {len(new_data)}件")

# 既存データと重複除去マージ
existing = []
if Path('shops.json').exists():
    existing = json.load(open('shops.json', encoding='utf-8'))
    print(f"既存: {len(existing)}件")

seen = set()
merged = []
for s in existing + new_data:
    key = (s.get('name',''), s.get('pref',''))
    if key not in seen:
        seen.add(key)
        merged.append(s)

for i, s in enumerate(merged):
    s['id'] = i + 1

json.dump(merged, open('shops.json','w',encoding='utf-8'), ensure_ascii=False, indent=2)
print(f"マージ後: {len(merged)}件")
PYEOF

      - name: "${{ matrix.prefecture }} をコミット"
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main   # 他の県のpushと競合しないよう取得
          git add shops.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            COUNT=$(python -c "import json; print(len(json.load(open('shops.json'))))")
            git commit -m "🔄 ${{ matrix.prefecture }}: ${COUNT}件 ($(date +'%Y-%m-%d'))"
            git push
            echo "✅ ${{ matrix.prefecture }} 完了: ${COUNT}件"
          fi
