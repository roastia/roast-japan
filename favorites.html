<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ - roastia</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Josefin+Sans:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');
:root {
  --bg:#faf7f4; --bg2:#f0e8df; --bg3:#e6ddd3;
  --border:rgba(111,78,55,0.15); --border2:rgba(111,78,55,0.30);
  --gold:#6F4E37; --gold-dim:#7D4A31;
  --cream:#3d2010; --text:#3d2010; --text-dim:#8a6650;
  --accent:#882D17;
  --mono:'DM Mono',monospace; --serif:'Playfair Display',Georgia,serif; --sans:'Josefin Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:16px;line-height:1.7;min-height:100vh;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.logo{font-size:13px;letter-spacing:.25em;font-family:var(--sans);font-weight:600;color:var(--gold);text-transform:uppercase;text-decoration:none;}
nav{display:flex;gap:1.2rem;align-items:center;}
nav a{font-family:var(--sans);font-size:11px;letter-spacing:.15em;color:var(--text-dim);text-decoration:none;text-transform:uppercase;transition:color .2s;}
nav a:hover{color:var(--gold);}
.btn-logout{background:transparent;border:1px solid var(--border2);color:var(--text-dim);font-family:var(--sans);font-size:11px;padding:5px 14px;border-radius:4px;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--gold);color:var(--gold);}

.page-wrap{max-width:960px;margin:0 auto;padding:2rem 1.5rem;}

/* ログインなし */
.login-prompt{text-align:center;padding:5rem 2rem;}
.login-prompt-title{font-family:var(--serif);font-size:1.4rem;color:var(--cream);margin-bottom:.8rem;}
.login-prompt-sub{font-family:var(--sans);font-size:13px;color:var(--text-dim);margin-bottom:2rem;}
.btn-go-login{display:inline-block;background:#6F4E37;color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.1em;padding:12px 32px;border-radius:4px;text-decoration:none;transition:opacity .2s;}
.btn-go-login:hover{opacity:.85;}

/* ローディング */
.loading{text-align:center;padding:4rem;font-family:var(--mono);font-size:12px;color:var(--text-dim);letter-spacing:.1em;}

/* プロフィール */
.profile-bar{display:flex;align-items:center;gap:14px;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.avatar-wrap{position:relative;flex-shrink:0;cursor:pointer;width:56px;height:56px;}
.avatar-ph{width:56px;height:56px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;}
.avatar-img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);}
.avatar-edit{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transition:opacity .2s;pointer-events:none;}
.avatar-wrap:hover .avatar-edit{opacity:1;}
.avatar-uploading{opacity:.5;}
.profile-name{font-family:var(--serif);font-size:1.2rem;color:var(--cream);}
.profile-email{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.profile-name-row{display:flex;align-items:center;gap:8px;}
.btn-edit-name{background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:color .15s;}
.btn-edit-name:hover{color:var(--cream);}
.name-input{font-family:var(--serif);font-size:1.2rem;color:var(--cream);background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:2px 8px;outline:none;width:160px;}
.btn-save-name{background:#6F4E37;color:#fff;border:none;font-family:var(--sans);font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;cursor:pointer;}

/* タブ */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.8rem;}
.tab-btn{background:none;border:none;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:10px 24px;cursor:pointer;position:relative;transition:color .2s;}
.tab-btn::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform .2s;}
.tab-btn.active{color:var(--gold);}
.tab-btn.active::after{transform:scaleX(1);}
.tab-btn:hover{color:var(--gold-dim);}
.tab-count{font-family:var(--mono);font-size:10px;margin-left:6px;background:var(--bg3);padding:2px 7px;border-radius:10px;}

/* タブコンテンツ */
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* 空状態 */
.empty-state{text-align:center;padding:4rem 2rem;}
.empty-icon{font-size:40px;margin-bottom:1rem;opacity:.4;}
.empty-title{font-family:var(--serif);font-size:1.2rem;color:var(--cream);margin-bottom:.5rem;}
.empty-sub{font-family:var(--sans);font-size:13px;color:var(--text-dim);margin-bottom:1.8rem;}
.btn-go-map{display:inline-block;background:#6F4E37;color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.1em;padding:11px 28px;border-radius:4px;text-decoration:none;transition:opacity .2s;}
.btn-go-map:hover{opacity:.85;}

/* 店舗グリッド共通 */
.shops-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.shop-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.shop-card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(111,78,55,.1);transform:translateY(-2px);}
.card-photo{width:100%;height:120px;object-fit:cover;display:block;background:var(--bg3);}
.card-photo-placeholder{width:100%;height:120px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3;}
.card-body{padding:.9rem;}
.card-pref{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.25rem;}
.card-name{font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--cream);line-height:1.3;margin-bottom:.5rem;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.5rem;}
.tag{font-family:var(--mono);font-size:8px;letter-spacing:.08em;padding:2px 6px;border-radius:2px;text-transform:uppercase;}
.tag-specialty{background:rgba(136,45,23,.10);color:#882D17;border:1px solid rgba(136,45,23,.25);}
.tag-online{background:rgba(125,74,49,.10);color:#7D4A31;border:1px solid rgba(125,74,49,.25);}
.tag-scaj{background:rgba(111,78,55,.10);color:#6F4E37;border:1px solid rgba(111,78,55,.25);}
.tag-cafe{background:rgba(112,66,65,.10);color:#704241;border:1px solid rgba(112,66,65,.25);}
.card-google-rating{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.card-google-rating .stars{color:#6F4E37;}

/* お気に入りタブ固有 */
.btn-unfav{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:1px solid rgba(192,64,96,.3);color:#c04060;font-size:13px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px);}
.btn-unfav:hover{background:#c04060;color:#fff;border-color:#c04060;}

/* 表示切り替えバー */
.view-toolbar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:12px;gap:4px;}
.view-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:14px;width:30px;height:30px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.view-btn:hover{border-color:var(--border2);color:var(--cream);}
.view-btn.active{background:#6F4E37;border-color:#6F4E37;color:#fff;}

/* リスト表示モード */
.shops-grid.list-view{grid-template-columns:1fr;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.shops-grid.list-view .shop-card{border-radius:0;border:none;border-bottom:1px solid var(--border);display:flex;flex-direction:row;align-items:center;transform:none !important;box-shadow:none !important;}
.shops-grid.list-view .shop-card:last-child{border-bottom:none;}
.shops-grid.list-view .card-photo,.shops-grid.list-view .card-photo-placeholder{display:none;}
.shops-grid.list-view .card-body{padding:.55rem 1rem;flex:1;min-width:0;display:flex;align-items:center;gap:10px;flex-wrap:nowrap;}
.shops-grid.list-view .card-name{font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0;flex:1;min-width:0;}
.shops-grid.list-view .card-pref{white-space:nowrap;margin-bottom:0;flex-shrink:0;}
.shops-grid.list-view .card-tags{margin-bottom:0;flex-wrap:nowrap;flex-shrink:0;}
.shops-grid.list-view .card-google-rating{flex-shrink:0;white-space:nowrap;}
.shops-grid.list-view .my-rating-row{margin-bottom:0;flex-shrink:0;}
.shops-grid.list-view .card-memo{display:none;}
.shops-grid.list-view .card-date{margin-top:0;flex-shrink:0;}
.shops-grid.list-view .btn-unfav,.shops-grid.list-view .btn-del-review{top:50%;transform:translateY(-50%);right:6px;}

/* ソートバー */
.sort-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.sort-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;margin-right:4px;}
.sort-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:3px;cursor:pointer;transition:all .15s;}
.sort-btn:hover{border-color:var(--border2);color:var(--cream);}
.sort-btn.active{background:#6F4E37;border-color:#6F4E37;color:#fff;}

/* 評価タブ固有 */
.my-rating-row{display:flex;align-items:center;gap:6px;margin-bottom:.4rem;}
.my-stars-display{color:#882D17;font-size:15px;letter-spacing:1px;}
.my-rating-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
.card-memo{font-family:var(--serif);font-size:12px;color:var(--text-dim);line-height:1.5;border-top:1px solid var(--border);padding-top:.5rem;margin-top:.4rem;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-date{font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-top:.5rem;letter-spacing:.05em;}
.btn-del-review{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:1px solid rgba(120,120,120,.3);color:#999;font-size:12px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px);}
/* フレンドタブ */
.friends-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.friend-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;text-align:center;}
.friend-card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(111,78,55,.1);transform:translateY(-2px);}
.friend-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);}
.friend-avatar-ph{width:52px;height:52px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;flex-shrink:0;}
.friend-name{font-family:var(--serif);font-size:.95rem;color:var(--cream);font-weight:600;}
.btn-unfollow{background:none;border:1px solid var(--border2);color:var(--text-dim);font-family:var(--sans);font-size:10px;padding:4px 12px;border-radius:3px;cursor:pointer;transition:all .2s;margin-top:auto;}
.btn-unfollow:hover{border-color:#c04060;color:#c04060;}

/* フォローボタン（他人ページ） */
.btn-follow{background:#6F4E37;color:#fff;border:none;font-family:var(--sans);font-size:11px;font-weight:600;padding:7px 18px;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:.05em;}
.btn-follow:hover{opacity:.85;}
.btn-follow.following{background:none;border:1px solid var(--border2);color:var(--text-dim);}
.btn-follow.following:hover{border-color:#c04060;color:#c04060;}

/* URLシェアボタン */
.btn-share-url{background:none;border:1px solid var(--border2);color:var(--text-dim);font-family:var(--sans);font-size:10px;padding:5px 12px;border-radius:3px;cursor:pointer;transition:all .2s;white-space:nowrap;position:relative;}
.btn-share-url:hover{border-color:var(--gold);color:var(--gold);}
/* シェアドロップダウン */
.share-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.14);z-index:999;min-width:200px;overflow:hidden;display:none;}
.share-dropdown.open{display:block;}
.share-dropdown-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:#999;padding:10px 14px 6px;border-bottom:1px solid #f0f0f0;text-transform:uppercase;}
.share-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;text-decoration:none;color:#333;font-family:var(--sans);font-size:12px;font-weight:600;}
.share-item:hover{background:#f7f3ee;}
.share-item-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.share-item-icon.line{background:#06C755;}
.share-item-icon.x{background:#000;}
.share-item-icon.fb{background:#1877F2;}
.share-item-icon.copy{background:#f0f0f0;}

/* 閲覧モードバナー */
.view-mode-banner{background:rgba(111,78,55,.07);border:1px solid var(--border);border-radius:6px;padding:.6rem 1rem;margin-bottom:1.4rem;font-family:var(--sans);font-size:12px;color:var(--text-dim);letter-spacing:.05em;}

/* 行ってみたいボタン */
.btn-add-wish{background:#f3e5f5;border:1px solid #ce93d8;color:#7B1FA2;font-family:var(--sans);font-size:10px;font-weight:600;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .2s;margin-top:6px;display:inline-block;}
.btn-add-wish:hover{background:#e1bee7;}
.btn-add-wish:disabled{background:#f5f5f5;border-color:#ddd;color:#aaa;cursor:not-allowed;}

.btn-del-review:hover{background:#888;color:#fff;border-color:#888;}

footer{border-top:1px solid var(--border);padding:1rem;text-align:center;font-family:var(--sans);font-size:11px;color:var(--text-dim);margin-top:3rem;}
footer a{color:var(--gold-dim);text-decoration:none;}
footer a:hover{color:var(--gold);}

@media(max-width:640px){
  .page-wrap{padding:1.2rem .8rem;}
  .tab-btn{font-size:11px;padding:9px 14px;}
  .shops-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .card-body{padding:.7rem;}
  .card-name{font-size:.88rem;}
}
@media(max-width:380px){
  .shops-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">roastia</a>
  <nav>
    <a href="index.html">← マップに戻る</a>
    <button class="btn-logout" id="btn-logout" style="display:none" onclick="doLogout()">ログアウト</button>
  </nav>
</header>

<div class="page-wrap">
  <div id="main-content">
    <div class="loading">LOADING...</div>
  </div>
</div>

<footer>
  <a href="index.html">roastia</a> — 日本最大級の珈琲店データベース
</footer>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/roast-japan/sw.js').catch(()=>{}));
}
const firebaseConfig = {
  apiKey: "AIzaSyDsyPuwfAxBsqXO0iVXcM6NoOiXVLcFb7Q",
  authDomain: "roastia-f9907.firebaseapp.com",
  projectId: "roastia-f9907",
  storageBucket: "roastia-f9907.firebasestorage.app",
  messagingSenderId: "860378474766",
  appId: "1:860378474766:web:dc83b21a2f48c6db644f5f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let allShops = [];

// URLパラメータ取得
const urlParams = new URLSearchParams(location.search);
const viewUid = urlParams.get('uid'); // 他人のUIDがあれば他人ページ

async function loadShopsJson() {
  try {
    const res = await fetch('shops-full.json', { cache: 'default' });
    allShops = await res.json();
  } catch(e) { allShops = []; }
}

auth.onAuthStateChanged(async user => {
  const content = document.getElementById('main-content');
  const logoutBtn = document.getElementById('btn-logout');

  if (!user) {
    content.innerHTML = `
      <div class="login-prompt">
        <div class="login-prompt-title">ログインが必要です</div>
        <div class="login-prompt-sub">マイページを見るにはログインしてください</div>
        <a class="btn-go-login" href="index.html">ログインページへ</a>
      </div>`;
    return;
  }

  logoutBtn.style.display = 'inline-block';
  content.innerHTML = '<div class="loading">データを読み込み中...</div>';

  await loadShopsJson();

  // プロフィールをFirestoreにupsert（自分のページ or 他人ページどちらでも）
  try {
    await db.collection('users').doc(user.uid).collection('profile').doc('info').set({
      displayName: user.displayName || user.email.split('@')[0],
      photoURL: user.photoURL || '',
    }, { merge: true });
  } catch(e) { /* profileの書き込み失敗は無視 */ }

  // 表示対象UID
  const targetUid = (viewUid && viewUid !== user.uid) ? viewUid : null;

  if (targetUid) {
    // ── 他人のページを表示 ──
    await renderOtherPage(user, targetUid, content);
  } else {
    // ── 自分のページを表示 ──
    await renderMyPage(user, content);
  }
});

/* ── 自分のページ ── */
async function renderMyPage(user, content) {
  try {
    const [favsSnap, revsSnap, vcSnap, followingSnap, wishSnap] = await Promise.all([
      db.collection('users').doc(user.uid).collection('favorites').get(),
      db.collection('users').doc(user.uid).collection('reviews').get(),
      db.collection('users').doc(user.uid).collection('visitCounts').get(),
      db.collection('users').doc(user.uid).collection('following').get(),
      db.collection('users').doc(user.uid).collection('wishlist').get(),
    ]);

    const favIds   = new Set(favsSnap.docs.map(d => String(d.id)));
    const favDates = {};
    favsSnap.docs.forEach(d => { favDates[String(d.id)] = d.data().addedAt || null; });
    const reviews  = {};
    revsSnap.docs.forEach(d => { reviews[String(d.id)] = d.data(); });
    const visitCounts = {};
    vcSnap.docs.forEach(d => { visitCounts[String(d.id)] = d.data().count || 0; });
    const following = followingSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
    const wishIds = new Set(wishSnap.docs.map(d => String(d.id)));
    const wishDates = {};
    wishSnap.docs.forEach(d => { wishDates[String(d.id)] = d.data().addedAt || null; });

    const favShops = allShops.filter(s => favIds.has(String(s.id)));
    const wishShops = allShops.filter(s => wishIds.has(String(s.id)));
    const revShops = allShops.filter(s => {
      const r = reviews[String(s.id)];
      return r && (r.rating > 0 || r.memo || r.photoUrl);
    });

    const name = user.displayName || user.email.split('@')[0];
    const innerAvatar = user.photoURL
      ? `<img id="avatar-img" class="avatar-img" src="${user.photoURL}" alt="">`
      : `<div id="avatar-img" class="avatar-ph">☕</div>`;

    const shareUrl = `${location.origin}${location.pathname}?uid=${encodeURIComponent(user.uid)}`;

    content.innerHTML = `
      <div class="profile-bar">
        <label class="avatar-wrap" title="アイコンを変更">
          ${innerAvatar}
          <div class="avatar-edit">📷</div>
          <input type="file" accept="image/jpeg,image/png,image/heic,image/heif,image/webp" style="display:none" onchange="uploadAvatar(this)">
        </label>
        <div style="flex:1">
          <div class="profile-name-row">
            <span id="profile-name-display" class="profile-name">${escHtml(name)}</span>
            <button class="btn-edit-name" onclick="startEditName()" title="名前を変更">✏️</button>
          </div>
          <div class="profile-email">${escHtml(user.email)}</div>
        </div>

async function renderOtherPage(currentUser, targetUid, content) {

      db.collection('users').doc(targetUid).collection('favorites').get(),
      db.collection('users').doc(targetUid).collection('reviews').get(),
      db.collection('users').doc(targetUid).collection('visitCounts').get(),

    ]);

    const favIds   = new Set(favsSnap.docs.map(d => String(d.id)));

    const reviews  = {};
    revsSnap.docs.forEach(d => { reviews[String(d.id)] = d.data(); });
    const visitCounts = {};
    vcSnap.docs.forEach(d => { visitCounts[String(d.id)] = d.data().count || 0; });

    const favShops = allShops.filter(s => favIds.has(String(s.id)));
    const revShops = allShops.filter(s => {

      return r && (r.rating > 0 || r.memo || r.photoUrl);

    const profileData = profileSnap.exists ? profileSnap.data() : {};

    const innerAvatar = targetPhoto

      : `<div class="avatar-ph">☕</div>`;

    content.innerHTML = `
      <div class="view-mode-banner">👁 閲覧モード — ${escHtml(targetName)}さんのマイページ</div>
      <div class="profile-bar">
        <div class="avatar-wrap" style="cursor:default">
          ${innerAvatar}
        </div>
        <div style="flex:1">
          <div class="profile-name-row">
            <span class="profile-name">${escHtml(targetName)}</span>
          </div>
        </div>
        <button id="btn-follow-main" class="${followBtnClass}" onclick="toggleFollow('${escHtml(targetUid)}','${escHtml(currentUser.uid)}')">${followBtnText}</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" id="tab-fav" onclick="switchTab('fav')">
          <span style="color:#E53935">♥</span> お気に入り<span class="tab-count" id="fav-count">${favShops.length}</span>
        </button>
        <button class="tab-btn" id="tab-rev" onclick="switchTab('rev')">
          <span style="color:#FFB300">★</span> 評価済み<span class="tab-count" id="rev-count">${revShops.length}</span>
        </button>
      </div>
      <div class="view-toolbar">
        <button class="view-btn active" id="view-card" onclick="setViewMode('card')" title="カード表示">⊞</button>
        <button class="view-btn" id="view-list" onclick="setViewMode('list')" title="リスト表示">☰</button>
      </div>
      <div class="tab-panel active" id="panel-fav"></div>
      <div class="tab-panel" id="panel-rev"></div>

function switchTab(name) {
  ['fav','rev','friends','wish'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t===name);
    document.getElementById('panel-'+t)?.classList.toggle('active', t===name);
  });
}

let _viewMode = 'card';
function setViewMode(mode) {
  _viewMode = mode;
  document.getElementById('view-card')?.classList.toggle('active', mode === 'card');
  document.getElementById('view-list')?.classList.toggle('active', mode === 'list');
  document.querySelectorAll('.shops-grid').forEach(g => {

  });

/* ── 日付フォーマット ── */
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function unfollowFromCard(e, targetUid, currentUid, btn) {
  e.stopPropagation();
  if (!confirm('フォローを解除しますか？')) return;
  btn.disabled = true;
  try {
    const batch = db.batch();
    batch.delete(db.collection('users').doc(currentUid).collection('following').doc(targetUid));
    batch.delete(db.collection('users').doc(targetUid).collection('followers').doc(currentUid));
    await batch.commit();
    const card = btn.closest('.friend-card');
    fadeRemove(card);
    updateCount('friends-count', -1);
  } catch(err) { btn.disabled = false; console.error(err); alert('フォロー解除に失敗しました'); }
}

/* ── フォロー/フォロー解除（他人ページ） ── */
async function toggleFollow(targetUid, currentUid) {
  const btn = document.getElementById('btn-follow-main');
  if (!btn) return;
  btn.disabled = true;
  const state = window._followState || {};
  try {
    if (state.isFollowing) {
      // フォロー解除
      const batch = db.batch();
      batch.delete(db.collection('users').doc(currentUid).collection('following').doc(targetUid));
      batch.delete(db.collection('users').doc(targetUid).collection('followers').doc(currentUid));
      await batch.commit();
      state.isFollowing = false;
      btn.textContent = 'フォローする';
      btn.className = 'btn-follow';
    } else {
      // フォロー
      const currentUser = state.currentUser || auth.currentUser;
      const currentName = currentUser.displayName || currentUser.email.split('@')[0];
      const currentPhoto = currentUser.photoURL || '';
      // 相手のプロフィール取得
      const targetProfileSnap = await db.collection('users').doc(targetUid).collection('profile').doc('info').get();
      const targetProfile = targetProfileSnap.exists ? targetProfileSnap.data() : {};
      const targetName = targetProfile.displayName || 'ユーザー';
      const targetPhoto = targetProfile.photoURL || '';
      const now = firebase.firestore.FieldValue.serverTimestamp();
      const batch = db.batch();
      batch.set(
        db.collection('users').doc(currentUid).collection('following').doc(targetUid),
        { targetUid, displayName: targetName, photoURL: targetPhoto, followedAt: now }
      );
      batch.set(
        db.collection('users').doc(targetUid).collection('followers').doc(currentUid),
        { followerUid: currentUid, displayName: currentName, photoURL: currentPhoto, followedAt: now }
      );
      await batch.commit();
      state.isFollowing = true;
      btn.textContent = 'フォロー中';
      btn.className = 'btn-follow following';
    }
  } catch(err) { console.error(err); alert('操作に失敗しました'); }
  btn.disabled = false;
}

/* ── 評価パネル ── */
let _revSortKey = 'rating_desc';

function renderRevPanel(shops, reviews, visitCounts, uid) {
  const panel = document.getElementById('panel-rev');
  if (!shops.length) {
    panel.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon" style="color:#FFB300;opacity:.8">★</div>
        <div class="empty-title">評価した店舗はまだありません</div>
        <div class="empty-sub">写真・★・メモのいずれかで評価できます</div>
        <a class="btn-go-map" href="index.html">店舗を探す</a>
      </div>`;
    return;
  }

  // ソートバー
  const sortBar = document.createElement('div');
  sortBar.className = 'sort-bar';
  sortBar.innerHTML = `
    <span class="sort-label">並び替え</span>
    <button class="sort-btn${_revSortKey==='rating_desc'?' active':''}" onclick="_setRevSort('rating_desc',this)">★ 高い順</button>
    <button class="sort-btn${_revSortKey==='rating_asc'?' active':''}"  onclick="_setRevSort('rating_asc',this)">★ 低い順</button>
    <button class="sort-btn${_revSortKey==='date_desc'?' active':''}"   onclick="_setRevSort('date_desc',this)">新しい順</button>`;

  const grid = document.createElement('div');
  grid.id = 'rev-grid';
  grid.className = 'shops-grid';

  function renderGrid() {
    grid.innerHTML = '';
    const sorted = [...shops].sort((a, b) => {
      const ra = reviews[String(a.id)]?.rating || 0;
      const rb = reviews[String(b.id)]?.rating || 0;
      const ta = reviews[String(a.id)]?.updatedAt?.toMillis?.() || 0;
      const tb = reviews[String(b.id)]?.updatedAt?.toMillis?.() || 0;
      if (_revSortKey === 'rating_desc') return rb - ra;
      if (_revSortKey === 'rating_asc')  return ra - rb;
      return tb - ta; // date_desc
    });
    sorted.forEach(shop => {
      const rev = reviews[String(shop.id)] || {};
      const visitCount = visitCounts[String(shop.id)] || 0;
      grid.appendChild(makeRevCard(shop, rev, visitCount, uid));
    });
  }

  window._setRevSort = (key, btn) => {
    _revSortKey = key;
    sortBar.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  };

  renderGrid();
  panel.appendChild(sortBar);
  panel.appendChild(grid);
}

function makeRevCard(shop, rev, visitCount, uid) {
  const myRating   = rev.rating    || 0;
  const myMemo     = rev.memo      || '';
  const myPhotoUrl = rev.photoUrl  || '';
  const myStars    = myRating > 0 ? '★'.repeat(myRating)+'☆'.repeat(5-myRating) : '';
  const tagHtml    = makeTagHtml(shop.tags);
  const photo = myPhotoUrl
    ? `<img class="card-photo" src="${myPhotoUrl}" alt="${escHtml(shop.name)}" loading="lazy" onerror="this.outerHTML='<div class=card-photo-placeholder>☕</div>'">`
    : makePhotoHtml(shop);
  const memoHtml   = myMemo ? `<div class="card-memo">${escHtml(myMemo)}</div>` : '';
  const starsHtml  = myStars ? `<span class="my-stars-display">${myStars}</span>` : '';
  const dateHtml   = rev.updatedAt ? `<div class="card-date">★ ${fmtDate(rev.updatedAt)}</div>` : '';
  const visitHtml  = visitCount > 0 ? `<div class="card-date" style="color:#1565C0">📍 来店 ${visitCount}回</div>` : '';

  const card = document.createElement('div');
  card.className = 'shop-card';
  card.innerHTML = `
    ${photo}
    <button class="btn-del-review" onclick="deleteReview(event,'${shop.id}','${uid}')" title="評価を削除">✕</button>
    <div class="card-body">
      <div class="card-pref">${shop.pref}${shop.city?' · '+shop.city:''}</div>
      <div class="card-name">${escHtml(shop.name)}</div>
      <div class="card-tags">${tagHtml}</div>
      ${starsHtml ? `<div class="my-rating-row">${starsHtml}<span class="my-rating-label">あなたの評価</span></div>` : ''}
      ${memoHtml}
      ${dateHtml}
      ${visitHtml}
    </div>`;
  card.addEventListener('click', () => goToShop(shop.id));
  return card;
}

async function deleteReview(e, shopId, uid) {
  e.stopPropagation();
  if (!confirm('この評価を削除しますか？')) return;
  const btn = e.currentTarget;
  btn.disabled = true;
  try {
    await db.collection('users').doc(uid).collection('reviews').doc(String(shopId)).delete();
    const card = btn.closest('.shop-card');
    fadeRemove(card);
    updateCount('rev-count', -1);
  } catch(err) { btn.disabled = false; console.error(err); }
}

/* ── ユーティリティ ── */
function goToShop(shopId) {
  window.location.href = `index.html#shop-${shopId}`;
}

function fadeRemove(el) {
  el.style.transition = 'opacity .3s, transform .3s';
  el.style.opacity = '0';
  el.style.transform = 'scale(.95)';
  setTimeout(() => el.remove(), 300);
}

function updateCount(elId, delta) {
  const el = document.getElementById(elId);
  if (!el) return;
  const n = Math.max(0, parseInt(el.textContent||'0', 10) + delta);
  el.textContent = String(n);
}

function makeTagHtml(tags) {
  const labels = {specialty:'スペシャルティ',online:'通販あり',scaj:'SCAJ',cafe:'カフェ'};
  return (tags||[]).map(t => `<span class="tag tag-${t}">${labels[t]||t}</span>`).join('');
}

function makePhotoHtml(shop) {
  return (shop.photos && shop.photos[0])
    ? `<img class="card-photo" src="${shop.photos[0]}" alt="${escHtml(shop.name)}" loading="lazy" onerror="this.outerHTML='<div class=card-photo-placeholder>☕</div>'">`
    : '<div class="card-photo-placeholder">☕</div>';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function startEditName() {
  const row = document.querySelector('.profile-name-row');
  const current = document.getElementById('profile-name-display').textContent;
  row.innerHTML = `
    <input id="name-input" class="name-input" value="${escHtml(current)}" maxlength="30">
    <button class="btn-save-name" onclick="saveDisplayName()">保存</button>
    <button class="btn-edit-name" onclick="cancelEditName('${escHtml(current)}')">✕</button>`;
  const inp = document.getElementById('name-input');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => { if(e.key==='Enter') saveDisplayName(); if(e.key==='Escape') cancelEditName(current); });
}

function cancelEditName(name) {
  document.querySelector('.profile-name-row').innerHTML = `
    <span id="profile-name-display" class="profile-name">${escHtml(name)}</span>
    <button class="btn-edit-name" onclick="startEditName()" title="名前を変更">✏️</button>`;
}

async function saveDisplayName() {
  const inp = document.getElementById('name-input');
  if (!inp) return;
  const newName = inp.value.trim();
  if (!newName) return;
  try {
    const u = auth.currentUser;
    await u.updateProfile({ displayName: newName });
    // Firestoreのプロフィールも同期
    await db.collection('users').doc(u.uid).collection('profile').doc('info').set(
      { displayName: newName }, { merge: true }
    );
    cancelEditName(newName);
  } catch(e) {
    alert('名前の変更に失敗しました: ' + (e.message || e));
  }
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const avatarEl = document.getElementById('avatar-img');
  if (avatarEl) avatarEl.classList.add('avatar-uploading');
  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', 'roastia_upload');
    const res = await fetch('https://api.cloudinary.com/v1_1/daqkrj3zm/image/upload', { method:'POST', body:fd });
    if (!res.ok) throw new Error('upload failed');
    const data = await res.json();
    const url = data.secure_url;
    const u = auth.currentUser;
    await u.updateProfile({ photoURL: url });
    // Firestoreのプロフィールも同期
    await db.collection('users').doc(u.uid).collection('profile').doc('info').set(
      { photoURL: url }, { merge: true }
    );
    // アバター表示を即時更新
    if (avatarEl) {
      avatarEl.outerHTML = `<img id="avatar-img" class="avatar-img" src="${url}" alt="">`;
    }
  } catch(e) {
    alert('アップロードに失敗しました。再試行してください。');
    console.error(e);
  } finally {
    const el = document.getElementById('avatar-img');
    if (el) el.classList.remove('avatar-uploading');
    input.value = '';
  }
}

/* ── 行ってみたいパネル ── */
function renderWishPanel(shops, wishDates, uid) {
  const panel = document.getElementById('panel-wish');
  if (!shops.length) {
    panel.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon" style="color:#7B1FA2;opacity:.7">🏷</div>
        <div class="empty-title">行ってみたいお店はまだありません</div>
        <div class="empty-sub">友達のページの 🏷 ボタンでリストに追加できます</div>
        <a class="btn-go-map" href="index.html">店舗を探す</a>
      </div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'shops-grid';
  shops.forEach(shop => {
    const addedAt = wishDates[String(shop.id)] || null;
    const stars = '★'.repeat(Math.round(shop.rating||0))+'☆'.repeat(5-Math.round(shop.rating||0));
    const tagHtml = makeTagHtml(shop.tags);
    const photo = makePhotoHtml(shop);
    const ratingHtml = shop.rating
      ? `<div class="card-google-rating"><span class="stars">${stars}</span> ${shop.rating}${shop.reviews?' ('+shop.reviews.toLocaleString()+'件)':''}</div>` : '';
    const dateHtml = addedAt ? `<div class="card-date">🏷 ${fmtDate(addedAt)}</div>` : '';
    const card = document.createElement('div');
    card.className = 'shop-card';
    card.innerHTML = `
      ${photo}
      <button class="btn-unfav" style="border-color:rgba(123,31,162,.3);color:#7B1FA2" onclick="deleteWish(event,'${shop.id}','${uid}')" title="リストから削除">✕</button>
      <div class="card-body">
        <div class="card-pref">${shop.pref}${shop.city?' · '+shop.city:''}</div>
        <div class="card-name">${escHtml(shop.name)}</div>
        <div class="card-tags">${tagHtml}</div>
        ${ratingHtml}
        ${dateHtml}
      </div>`;
    card.addEventListener('click', () => goToShop(shop.id));
    grid.appendChild(card);
  });
  panel.appendChild(grid);
}

async function deleteWish(e, shopId, uid) {
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.disabled = true;
  try {
    await db.collection('users').doc(uid).collection('wishlist').doc(String(shopId)).delete();
    const card = btn.closest('.shop-card');
    fadeRemove(card);
    updateCount('wish-count', -1);
  } catch(err) { btn.disabled = false; console.error(err); alert('削除に失敗しました'); }
}

async function addToWishFromFriend(e, shopId) {
  e.stopPropagation();
  const btn = e.currentTarget;
  const currentUser = auth.currentUser;
  if (!currentUser) { alert('ログインが必要です'); return; }
  btn.disabled = true;
  btn.textContent = '追加中...';
  try {
    await db.collection('users').doc(currentUser.uid).collection('wishlist').doc(String(shopId)).set({
      addedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    btn.textContent = '✓ 追加済み';
  } catch(err) {
    console.error(err);
    alert('追加に失敗しました');
    btn.disabled = false;
    btn.textContent = '🏷 行ってみたい';
  }
}

async function doLogout() {
  await auth.signOut();
  location.reload();
}
</script>
